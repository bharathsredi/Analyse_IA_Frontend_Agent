services:
  - type: web
    name: analyse-ia-backend
    runtime: python
    buildCommand: pip install -r requirements/production.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: worker
    name: analyse-ia-celery
    runtime: python
    buildCommand: pip install -r requirements/production.txt
    startCommand: celery -A backend.api.celery.worker worker --loglevel=info -Q analysis,rag,agent --concurrency=1
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0