# Alembic migration configuration for Analyse_IA
# 
# Alembic is a lightweight database migration tool that integrates with SQLAlchemy.
# It detects model changes and generates SQL migration scripts automatically (autogenerate).
# 
# Configuration:
# - env.py: Migration environment setup (online/offline modes)
# - versions/: Directory containing generated migration scripts
# - DATABASE_URL from .env: Default database connection
# 
# Usage:
#   alembic revision --autogenerate -m "Add users table"
#   alembic upgrade head
#   alembic downgrade -1
#   alembic current

[alembic]
# Path to migration scripts (relative to this file location: %(here)s)
script_location = %(here)s/alembic

# Migration file naming: Default is %(rev)s_%(slug)s
# %(rev)s: Unique revision ID (e.g., 001, 002, 003)
# %(slug)s: Message slugified (e.g., "add_user_table" from -m "Add user table")

# Python path prepended when running Alembic (for module imports)
prepend_sys_path = .


# Timezone for migration file timestamps (optional, requires tzdata package)
# Leave blank for local timezone
# timezone =

# Maximum characters in slug field (from migration message)
# truncate_slug_length = 40

# Run env.py during 'alembic revision' (regardless of autogenerate status)
# revision_environment = false

# Detect .pyc/.pyo files as revisions (even without source .py)
# sourceless = false

# Migration script locations (defaults to alembic/versions)
# Colon-separated (Unix) or semicolon-separated (Windows) multiple directories
# First revision in new directory needs: alembic revision --version-path=path -m "Initial"
# version_locations = %(here)s/bar:%(here)s/bat:%(here)s/alembic/versions

# Use OS-specific path separator for version_locations and prepend_sys_path
path_separator = os

# Recursively search version_locations directories for migration scripts
# recursive_version_locations = false

# Output encoding for generated migration scripts
# output_encoding = utf-8

# Database connection URL
# Format: database://user:password@host:port/database
# In env.py, this is overridden by DATABASE_URL from .env file
# %(DATABASE_URL)s references the DATABASE_URL environment variable
sqlalchemy.url = %(DATABASE_URL)s


[post_write_hooks]
# Post-write hooks: Run commands/functions after generating migration scripts
# Useful for code formatting (black, ruff) or custom processing
# 
# Runners: console_scripts (pip), module (import), exec (binary on PATH)
# Variable: REVISION_SCRIPT_FILENAME holds the generated migration file path
# 
# Example: Auto-format migration files with black
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME
# 
# Example: Check and fix with ruff (Unix/macOS)
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

# Logging Configuration
# 
# Alembic uses Python's logging module to debug migration execution.
# Configure verbosity for different components:
# - root (level=WARNING): Default verbosity (use NOTSET/DEBUG for details)
# - sqlalchemy (level=WARNING): SQLAlchemy engine events (use INFO for SQL logging)
# - alembic (level=INFO): Alembic framework events

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

# Root logger: Fallback for all unspecified loggers
# level=WARNING: Only warn/error shown | level=NOTSET: All levels shown
[logger_root]
level = WARNING
handlers = console
qualname =

# SQLAlchemy engine logger: Database operations
# level=WARNING: Minimal | level=INFO: SQL statements shown
[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

# Alembic framework logger: Migration lifecycle events
[logger_alembic]
level = INFO
handlers =
qualname = alembic

# Console output handler: Sends logs to stderr
[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

# Log message format: [LEVEL] [logger_name] message
# Example: WARNING [alembic.runtime.migration] Context impl PostgreSQL
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
